<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="English 9 Prep">
<meta name="theme-color" content="#f4ede0">
<title>Trey's English 9 Final Prep</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' fill='%23f4ede0'/%3E%3Ctext x='90' y='120' font-family='Georgia,serif' font-size='110' font-weight='700' text-anchor='middle' fill='%231a1a1a'%3EE%3C/text%3E%3C/svg%3E">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23f4ede0'/%3E%3Ctext x='32' y='46' font-family='Georgia,serif' font-size='42' font-weight='700' text-anchor='middle' fill='%231a1a1a'%3EE%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,400;9..144,500;9..144,600;9..144,700;9..144,800&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --paper: #f4ede0;
  --paper-2: #ebe1cf;
  --paper-3: #ddd0b8;
  --ink: #1a1a1a;
  --ink-2: #3a3a3a;
  --ink-3: #6a6a6a;
  --accent: #a8321e;
  --accent-2: #d4441f;
  --gold: #b88a2c;
  --green: #4a6b3e;
  --green-soft: #d9e0c9;
  --red-soft: #f0d4ca;
  --line: #c9bda3;
  --shadow: 0 1px 0 rgba(26,26,26,0.08), 0 4px 16px rgba(60,40,10,0.06);
  --radius: 14px;
  --radius-sm: 10px;
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  margin: 0; padding: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: 'Inter Tight', system-ui, sans-serif;
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -webkit-text-size-adjust: 100%;
  overscroll-behavior-y: contain;
}
body {
  background-image:
    radial-gradient(rgba(120,90,40,0.04) 1px, transparent 1px);
  background-size: 6px 6px;
  min-height: 100vh;
  min-height: 100dvh;
}
.serif { font-family: 'Fraunces', Georgia, serif; font-feature-settings: "ss01" on; }
.mono { font-family: 'JetBrains Mono', monospace; }

.app {
  max-width: 720px;
  margin: 0 auto;
  padding: 14px 14px calc(100px + var(--safe-bot)) 14px;
}

/* HEADER */
.head {
  display: flex; align-items: baseline; justify-content: space-between;
  padding: 6px 4px 18px 4px;
  border-bottom: 2px solid var(--ink);
  margin-bottom: 18px;
}
.head .title {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 800;
  font-size: 22px;
  letter-spacing: -0.02em;
  line-height: 1;
}
.head .subtitle {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--ink-3);
  font-weight: 600;
}

/* NAV TABS */
.tabs {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  margin-bottom: 18px;
}
.tab {
  background: var(--paper-2);
  border: 1.5px solid var(--line);
  color: var(--ink-2);
  padding: 10px 6px;
  border-radius: var(--radius-sm);
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  text-align: center;
  min-height: 46px;
  transition: all 0.12s ease;
  font-feature-settings: "ss01" on;
}
.tab:active { transform: scale(0.97); }
.tab.active {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
}

/* CARDS */
.card {
  background: #fbf6ea;
  border: 1.5px solid var(--line);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 14px;
  box-shadow: var(--shadow);
}
.card.dark {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
}

/* HOME / DASHBOARD */
.dash-hero {
  background: linear-gradient(140deg, #1a1a1a 0%, #2a2520 100%);
  color: var(--paper);
  border-radius: var(--radius);
  padding: 22px 20px;
  margin-bottom: 14px;
  position: relative;
  overflow: hidden;
}
.dash-hero::before {
  content: '';
  position: absolute; top: -40px; right: -30px;
  width: 140px; height: 140px;
  border-radius: 50%;
  background: radial-gradient(circle at center, rgba(184,138,44,0.35), transparent 70%);
  pointer-events: none;
}
.dash-eyebrow {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.22em;
  color: var(--gold);
  font-weight: 600;
  margin-bottom: 6px;
}
.dash-pct {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 800;
  font-size: 64px;
  line-height: 1;
  letter-spacing: -0.04em;
  margin: 4px 0 2px 0;
  font-variant-numeric: tabular-nums;
}
.dash-pct .small { font-size: 32px; opacity: 0.6; }
.dash-status {
  font-size: 14px;
  color: rgba(244,237,224,0.8);
  margin-top: 8px;
  line-height: 1.4;
}
.dash-status strong { color: var(--gold); font-weight: 600; }
.dash-hero.ready { background: linear-gradient(140deg, #2c4a23 0%, #4a6b3e 100%); }
.dash-hero.ready .dash-eyebrow { color: #d9e0c9; }
.dash-hero.ready .dash-status { color: rgba(244,237,224,0.9); }

.stat-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 14px;
}
.stat {
  background: #fbf6ea;
  border: 1.5px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 10px 8px;
  text-align: center;
}
.stat .n {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 700;
  font-size: 22px;
  line-height: 1;
  letter-spacing: -0.02em;
}
.stat .lbl {
  font-size: 9.5px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--ink-3);
  margin-top: 4px;
  font-weight: 600;
}

.section-title {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 700;
  font-size: 20px;
  margin: 18px 0 10px 0;
  letter-spacing: -0.02em;
  display: flex; align-items: baseline; justify-content: space-between;
}
.section-title .sub {
  font-family: 'Inter Tight', sans-serif;
  font-weight: 500;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--ink-3);
}

.menu-btn {
  width: 100%;
  background: #fbf6ea;
  border: 1.5px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  text-align: left;
  cursor: pointer;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px;
  transition: all 0.12s ease;
  color: var(--ink);
}
.menu-btn:active { transform: scale(0.985); background: var(--paper-2); }
.menu-btn .mb-title {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 600;
  font-size: 16px;
  letter-spacing: -0.01em;
}
.menu-btn .mb-meta {
  font-size: 11.5px;
  color: var(--ink-3);
  margin-top: 2px;
  font-weight: 500;
}
.menu-btn .mb-prog {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--ink-3);
  font-weight: 500;
  text-align: right;
  min-width: 50px;
}
.menu-btn.done .mb-prog { color: var(--green); }
.menu-btn .chevron { margin-left: 10px; color: var(--ink-3); }

.prog-bar {
  height: 4px;
  background: var(--paper-3);
  border-radius: 2px;
  overflow: hidden;
  margin-top: 8px;
}
.prog-fill {
  height: 100%;
  background: var(--accent);
  transition: width 0.3s ease;
}
.prog-fill.green { background: var(--green); }

/* BUTTONS */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--ink);
  color: var(--paper);
  border: none;
  padding: 13px 18px;
  border-radius: var(--radius-sm);
  font-family: 'Inter Tight', sans-serif;
  font-weight: 600;
  font-size: 15px;
  cursor: pointer;
  min-height: 46px;
  width: 100%;
  letter-spacing: -0.01em;
  transition: all 0.12s ease;
}
.btn:active { transform: scale(0.98); }
.btn.secondary { background: var(--paper-2); color: var(--ink); border: 1.5px solid var(--line); }
.btn.ghost { background: transparent; color: var(--ink-2); }
.btn.accent { background: var(--accent); color: white; }
.btn.green { background: var(--green); color: white; }
.btn.small { padding: 8px 12px; font-size: 13px; min-height: 36px; width: auto; }
.btn-row { display: flex; gap: 8px; }
.btn-row .btn { flex: 1; }

/* FLASHCARD */
.flash-wrap {
  perspective: 1200px;
  margin: 20px 0 18px 0;
}
.flash {
  background: #fbf6ea;
  border: 2px solid var(--line);
  border-radius: var(--radius);
  min-height: 280px;
  padding: 30px 22px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer;
  text-align: center;
  position: relative;
  box-shadow: var(--shadow);
  transition: all 0.18s ease;
}
.flash:active { transform: scale(0.99); }
.flash.flipped { background: #fff8ea; border-color: var(--gold); }
.flash .word {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 700;
  font-size: 38px;
  letter-spacing: -0.03em;
  line-height: 1.1;
  margin-bottom: 6px;
  font-feature-settings: "ss01" on;
}
.flash .pos {
  font-style: italic;
  color: var(--ink-3);
  font-size: 13px;
  margin-bottom: 14px;
  font-family: 'Fraunces', serif;
}
.flash .defn {
  font-size: 17px;
  line-height: 1.45;
  color: var(--ink-2);
  margin-bottom: 16px;
  max-width: 480px;
}
.flash .example {
  font-style: italic;
  font-family: 'Fraunces', Georgia, serif;
  font-size: 15px;
  color: var(--ink-3);
  border-top: 1px solid var(--line);
  padding-top: 12px;
  margin-top: auto;
  max-width: 480px;
}
.flash .tap-hint {
  position: absolute; bottom: 10px; left: 0; right: 0;
  text-align: center;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--ink-3);
  font-weight: 600;
}
.flash .badge {
  position: absolute;
  top: 12px; right: 14px;
  font-size: 9.5px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  background: var(--paper-3);
  color: var(--ink-2);
  padding: 3px 8px;
  border-radius: 20px;
  font-weight: 600;
}
.flash .badge.mastered { background: var(--green-soft); color: var(--green); }

.flash-nav {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-top: 14px;
}
.flash-nav .btn { width: 100%; padding: 10px; font-size: 13px; min-height: 42px; }

.flash-counter {
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--ink-3);
  margin-top: 10px;
}

/* QUIZ */
.q-wrap { margin: 4px 0 12px 0; }
.q-progress {
  display: flex; gap: 4px;
  margin-bottom: 14px;
}
.q-progress .dot {
  flex: 1; height: 4px;
  background: var(--paper-3);
  border-radius: 2px;
}
.q-progress .dot.done { background: var(--green); }
.q-progress .dot.miss { background: var(--accent); }
.q-progress .dot.current { background: var(--ink); }

.q-prompt {
  background: #fbf6ea;
  border: 1.5px solid var(--line);
  border-radius: var(--radius);
  padding: 22px 18px;
  margin-bottom: 12px;
  text-align: center;
}
.q-prompt .word {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 700;
  font-size: 30px;
  letter-spacing: -0.02em;
  font-feature-settings: "ss01" on;
  line-height: 1.15;
}
.q-prompt .meta {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--ink-3);
  font-weight: 600;
  margin-bottom: 8px;
}
.q-prompt .sentence {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 18px;
  line-height: 1.45;
  text-align: left;
  font-feature-settings: "ss01" on;
}
.q-prompt .sentence em.target {
  background: rgba(184,138,44,0.18);
  font-style: italic;
  padding: 0 3px;
  border-radius: 3px;
}

.q-options { display: flex; flex-direction: column; gap: 8px; }
.q-opt {
  background: #fbf6ea;
  border: 1.5px solid var(--line);
  color: var(--ink);
  padding: 14px 16px;
  border-radius: var(--radius-sm);
  text-align: left;
  font-family: 'Inter Tight', sans-serif;
  font-size: 15px;
  line-height: 1.4;
  cursor: pointer;
  min-height: 50px;
  transition: all 0.12s ease;
  width: 100%;
  display: flex; align-items: center;
}
.q-opt:active { transform: scale(0.99); }
.q-opt.right { background: var(--green-soft); border-color: var(--green); }
.q-opt.wrong { background: var(--red-soft); border-color: var(--accent); }
.q-opt.disabled { cursor: default; opacity: 0.65; }
.q-opt.disabled.right { opacity: 1; }

.feedback {
  margin: 12px 0 4px 0;
  padding: 14px 16px;
  border-radius: var(--radius-sm);
  font-size: 14.5px;
  line-height: 1.45;
  border: 1.5px solid;
}
.feedback.right { background: var(--green-soft); border-color: var(--green); color: var(--ink); }
.feedback.wrong { background: var(--red-soft); border-color: var(--accent); color: var(--ink); }
.feedback strong { font-family: 'Fraunces', serif; font-weight: 700; }

/* RULES */
.rule {
  background: #fbf6ea;
  border: 1.5px solid var(--line);
  border-left: 4px solid var(--accent);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  margin-bottom: 10px;
}
.rule .rule-num {
  font-family: 'Fraunces', serif;
  font-weight: 700;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--accent);
  margin-bottom: 4px;
}
.rule .rule-title {
  font-family: 'Fraunces', serif;
  font-weight: 700;
  font-size: 17px;
  margin-bottom: 6px;
  letter-spacing: -0.01em;
}
.rule .rule-body { font-size: 14.5px; line-height: 1.55; color: var(--ink-2); }
.rule .ex {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 15px;
  color: var(--ink);
  background: var(--paper-2);
  padding: 8px 12px;
  border-radius: 6px;
  margin-top: 8px;
  border-left: 2px solid var(--gold);
  line-height: 1.5;
}
.rule .ex em { font-style: italic; font-weight: 500; }
.rule .ex .hi { color: var(--accent); font-weight: 700; }
.rule .ex.wrong { border-left-color: var(--accent); opacity: 0.65; text-decoration: line-through; text-decoration-color: var(--accent); font-style: italic; }
.rule .ex.wrong em { font-style: normal; font-weight: 600; }

/* LISTS / TABLES */
.list-table {
  background: #fbf6ea;
  border: 1.5px solid var(--line);
  border-radius: var(--radius-sm);
  overflow: hidden;
  margin-bottom: 14px;
}
.list-row {
  display: grid;
  grid-template-columns: 130px 1fr;
  border-bottom: 1px solid var(--paper-3);
  padding: 10px 14px;
  font-size: 14.5px;
  align-items: baseline;
}
.list-row:last-child { border-bottom: none; }
.list-row .w {
  font-family: 'Fraunces', serif;
  font-weight: 700;
  font-size: 15.5px;
  letter-spacing: -0.01em;
}
.list-row .d { color: var(--ink-2); line-height: 1.4; }
.list-row .d em { color: var(--ink-3); font-style: italic; font-family: 'Fraunces', serif; }

/* CHIP */
.chip-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.chip {
  background: var(--paper-2);
  border: 1.5px solid var(--line);
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12.5px;
  font-weight: 600;
  cursor: pointer;
  color: var(--ink-2);
  font-family: 'Fraunces', serif;
}
.chip.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

/* SCORE */
.score-screen {
  text-align: center;
  padding: 30px 16px 16px 16px;
}
.score-screen .score-pct {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 800;
  font-size: 72px;
  letter-spacing: -0.04em;
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
.score-screen .score-pct .small { font-size: 36px; opacity: 0.5; }
.score-screen .score-msg {
  font-family: 'Fraunces', serif;
  font-weight: 600;
  font-size: 20px;
  margin: 8px 0 6px 0;
  letter-spacing: -0.01em;
}
.score-screen .score-sub {
  color: var(--ink-3);
  font-size: 14px;
  margin-bottom: 22px;
}
.review-list { text-align: left; }
.review-row {
  background: var(--red-soft);
  border-left: 3px solid var(--accent);
  padding: 10px 12px;
  margin-bottom: 6px;
  border-radius: 6px;
  font-size: 14px;
}
.review-row .rw-q { font-weight: 600; margin-bottom: 4px; }
.review-row .rw-a { color: var(--ink-2); font-size: 13.5px; }
.review-row .rw-a em { font-style: italic; font-family: 'Fraunces', serif; color: var(--accent); }

/* MISC */
.note {
  font-size: 12.5px;
  color: var(--ink-3);
  font-style: italic;
  font-family: 'Fraunces', serif;
  text-align: center;
  margin: 10px 0;
  line-height: 1.45;
}
.spacer-12 { height: 12px; }
.spacer-20 { height: 20px; }
hr.divider { border: none; border-top: 1px dashed var(--line); margin: 18px 0; }

.helper-toolbar {
  display: flex; gap: 6px; margin: 8px 0 4px 0; flex-wrap: wrap;
}
.helper-toolbar .btn { flex: 0 0 auto; padding: 8px 12px; font-size: 12.5px; min-height: 36px; width: auto; }

/* ACCENT BAR for grammar examples */
.italicz { font-style: italic; }
.quoted::before { content: '"'; }
.quoted::after { content: '"'; }

/* Mastery legend */
.legend {
  display: flex; gap: 12px; font-size: 11.5px; color: var(--ink-3);
  justify-content: center; margin: 8px 0 4px 0;
}
.legend span { display: inline-flex; align-items: center; gap: 4px; }
.legend .dot {
  display: inline-block; width: 8px; height: 8px; border-radius: 50%;
}
.legend .dot.g { background: var(--green); }
.legend .dot.y { background: var(--gold); }
.legend .dot.r { background: var(--accent); }

/* Footer reset */
.footer-actions {
  margin: 28px 0 0 0;
  padding: 14px 0;
  border-top: 1px dashed var(--line);
  text-align: center;
}
.footer-actions a {
  font-size: 12px; color: var(--ink-3);
  text-decoration: underline; cursor: pointer;
  font-family: 'Fraunces', serif; font-style: italic;
}

.fade-in { animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

@media (max-width: 380px) {
  .flash .word { font-size: 32px; }
  .q-prompt .word { font-size: 26px; }
  .dash-pct { font-size: 54px; }
  .stat .n { font-size: 18px; }
  .tab { font-size: 12px; padding: 9px 4px; }
}
</style>
</head>
<body>
<div class="app">

<div class="head">
  <div>
    <div class="title serif">English 9 Final Prep</div>
    <div class="subtitle">Vocab · Commas · Quotes &amp; Italics · Apostrophes</div>
  </div>
</div>

<div class="tabs" id="tabs"></div>

<div id="view"></div>

<div class="footer-actions">
  <a id="resetLink">Reset all progress</a>
</div>

</div>

<script>
"use strict";

/* ============ DATA: VOCAB ============ */
const VOCAB = [
  // LIST 1

/* ============ STATE ============ */
const STORAGE_KEY = "trey_eng9_v1";
const defaultState = {
  vocab: {},          // word -> { correct: int, streak: int, seen: int }
  comma: {},          // qIdx -> { correct: int, seen: int }
  qi: {},             // qIdx -> { correct: int, seen: int }
  apos: {},           // qIdx -> { correct: int, seen: int }
  mockHistory: [],    // [{ date, score, total, sections }]
  bestMock: 0
};
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return JSON.parse(JSON.stringify(defaultState));
    const s = JSON.parse(raw);
    return Object.assign(JSON.parse(JSON.stringify(defaultState)), s);
  } catch (e) {
    return JSON.parse(JSON.stringify(defaultState));
  }
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
}
let state = loadState();

/* ============ MASTERY HELPERS ============ */
const MASTERY_STREAK = 2; // correct twice in a row = mastered

function isVocabMastered(w) {
  const r = state.vocab[w];
  return !!(r && r.streak >= MASTERY_STREAK);
}
function vocabMasteredCount() {
  return VOCAB.filter(v => isVocabMastered(v.w)).length;
}
function masteryLevel(record) {
  if (!record || record.seen === 0) return "new";
  if (record.streak >= MASTERY_STREAK) return "mastered";
  if (record.correct >= 1) return "learning";
  return "weak";
}
function recordVocab(word, right) {
  const r = state.vocab[word] || { correct: 0, streak: 0, seen: 0 };
  r.seen++;
  if (right) { r.correct++; r.streak++; }
  else { r.streak = 0; }
  state.vocab[word] = r;
  saveState();
}
function recordCommaQ(idx, right) {
  const r = state.comma[idx] || { correct: 0, seen: 0 };
  r.seen++; if (right) r.correct++;
  state.comma[idx] = r; saveState();
}
function recordQI(idx, right) {
  const r = state.qi[idx] || { correct: 0, seen: 0 };
  r.seen++; if (right) r.correct++;
  state.qi[idx] = r; saveState();
}
function recordApos(idx, right) {
  const r = state.apos[idx] || { correct: 0, seen: 0 };
  r.seen++; if (right) r.correct++;
  state.apos[idx] = r; saveState();
}
function commaAccuracy() {
  const seen = Object.values(state.comma).filter(r => r.seen > 0);
  if (seen.length === 0) return { pct: 0, seen: 0, total: COMMA_Q.length, correct: 0 };
  const correct = seen.reduce((a, r) => a + (r.correct > 0 ? 1 : 0), 0);
  return { pct: Math.round(100 * correct / COMMA_Q.length), seen: seen.length, total: COMMA_Q.length, correct };
}
function qiAccuracy() {
  const seen = Object.values(state.qi).filter(r => r.seen > 0);
  if (seen.length === 0) return { pct: 0, seen: 0, total: QI_Q.length, correct: 0 };
  const correct = seen.reduce((a, r) => a + (r.correct > 0 ? 1 : 0), 0);
  return { pct: Math.round(100 * correct / QI_Q.length), seen: seen.length, total: QI_Q.length, correct };
}
function aposAccuracy() {
  const seen = Object.values(state.apos).filter(r => r.seen > 0);
  if (seen.length === 0) return { pct: 0, seen: 0, total: APOS_Q.length, correct: 0 };
  const correct = seen.reduce((a, r) => a + (r.correct > 0 ? 1 : 0), 0);
  return { pct: Math.round(100 * correct / APOS_Q.length), seen: seen.length, total: APOS_Q.length, correct };
}

/* Overall Test Ready %:
   - 40% weight: vocab mastery (mastered / 60)
   - 15% weight: comma practice (correct / total)
   - 15% weight: q/i practice (correct / total)
   - 15% weight: apostrophe practice (correct / total)
   - 15% weight: best mock test score (capped at 85%+)
*/
function testReady() {
  const vPct = vocabMasteredCount() / VOCAB.length;
  const cPct = commaAccuracy().correct / COMMA_Q.length;
  const qPct = qiAccuracy().correct / QI_Q.length;
  const aPct = aposAccuracy().correct / APOS_Q.length;
  const mPct = Math.min(state.bestMock / 85, 1);
  const score = vPct * 0.40 + cPct * 0.15 + qPct * 0.15 + aPct * 0.15 + mPct * 0.15;
  return Math.round(score * 100);
}
function statusMessage() {
  const v = vocabMasteredCount();
  const c = commaAccuracy();
  const q = qiAccuracy();
  const a = aposAccuracy();
  const m = state.bestMock;

  const todo = [];
  if (v < VOCAB.length) todo.push(`Master <strong>${VOCAB.length - v}</strong> more vocab words`);
  if (c.correct < COMMA_Q.length) todo.push(`Get <strong>${COMMA_Q.length - c.correct}</strong> more comma questions right`);
  if (q.correct < QI_Q.length) todo.push(`Get <strong>${QI_Q.length - q.correct}</strong> more quote/italics right`);
  if (a.correct < APOS_Q.length) todo.push(`Get <strong>${APOS_Q.length - a.correct}</strong> more apostrophe questions right`);
  if (m < 85) todo.push(`Score <strong>85%+</strong> on one mock test`);

  if (todo.length === 0) return "You're test ready. Locked in. 🎉";
  if (todo.length === 1) return "Almost there. " + todo[0] + ".";
  return todo.slice(0, 2).join(" · ");
}

const TABS = [
  { id: "home", label: "Home" },
  { id: "vocab", label: "Vocab" },

  { id: "qi", label: "Quotes & Italics" },
  { id: "apos", label: "Apostrophes" },
  { id: "mock", label: "Mock Test" },
  { id: "cheat", label: "Cheat Sheet" }
];
let currentTab = "home";

function renderTabs() {
  const tabsEl = document.getElementById("tabs");
  tabsEl.style.gridTemplateColumns = `repeat(${Math.min(TABS.length, 3)}, 1fr)`;
  // Two rows if more than 3
  if (TABS.length > 3) tabsEl.style.gridTemplateColumns = "repeat(3, 1fr)";
  tabsEl.innerHTML = TABS.map(t => `<button class="tab ${currentTab === t.id ? 'active' : ''}" data-tab="${t.id}">${t.label}</button>`).join("");
  tabsEl.querySelectorAll(".tab").forEach(b => b.addEventListener("click", () => switchTab(b.dataset.tab)));
}
function switchTab(id) {
  currentTab = id;
  renderTabs();
  render();
  window.scrollTo({ top: 0, behavior: "instant" });
}

/* ============ RENDER ============ */
function render() {
  const view = document.getElementById("view");
  view.classList.remove("fade-in");
  void view.offsetWidth;
  view.classList.add("fade-in");
  switch (currentTab) {
    case "home": renderHome(view); break;
    case "vocab": renderVocab(view); break;
    case "commas": renderCommas(view); break;
    case "qi": renderQI(view); break;
    case "apos": renderApos(view); break;
    case "mock": renderMock(view); break;
    case "cheat": renderCheat(view); break;
  }
}

/* Vocab Quiz: pick a word, give 4 def options OR pick a def, give 4 word options */
let vqState = null; // { question, options, answer, mode, settled }

function buildVocabQuestion() {
  const pool = getVocabPool();
  if (pool.length === 0) return null;
  // Weight selection toward not-mastered words
  const weights = pool.map(v => isVocabMastered(v.w) ? 1 : 4);
  const target = weightedPick(pool, weights);
  const isDefMode = Math.random() < 0.55; // mostly word -> def, sometimes def -> word
  let q, options, correctIdx;
  // For variety also include "use in a sentence" mode (blank in example)
  const useSentence = Math.random() < 0.25 && target.ex.toLowerCase().includes(target.w.toLowerCase().slice(0, 4));
  if (useSentence) {
    // Replace the word in the example with a blank
    const re = new RegExp(target.w.replace(/y$/, "[a-z]*"), "i");
    const blanked = target.ex.replace(re, "_____");
    q = { type: "sentence", word: target.w, sentence: blanked, def: target.def };
    options = pickDistractors(target, "word", 3).concat([target.w]);
    options = shuffle(options);
    correctIdx = options.indexOf(target.w);
  } else if (isDefMode) {
    q = { type: "wordToDef", word: target.w, pos: target.pos, list: target.list, forms: target.forms };
    options = pickDistractors(target, "def", 3).concat([target.def]);
    options = shuffle(options);
    correctIdx = options.indexOf(target.def);
  } else {
    q = { type: "defToWord", def: target.def, pos: target.pos };
    options = pickDistractors(target, "word", 3).concat([target.w]);
    options = shuffle(options);
    correctIdx = options.indexOf(target.w);
  }
  return { question: q, options, answer: correctIdx, target, settled: false };
}
function pickDistractors(target, kind, n) {
  const pool = VOCAB.filter(v => v.w !== target.w);
  // Prefer same part of speech for tougher distractors
  const samePos = pool.filter(v => v.pos === target.pos);
  const ordered = samePos.concat(pool.filter(v => v.pos !== target.pos));
  shuffle(ordered);
  return ordered.slice(0, n).map(v => kind === "def" ? v.def : v.w);
}
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
function weightedPick(arr, weights) {
  const total = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  for (let i = 0; i < arr.length; i++) { r -= weights[i]; if (r <= 0) return arr[i]; }
  return arr[arr.length - 1];
}

function renderVocabQuiz(body) {
  if (!vqState) vqState = buildVocabQuestion();
  if (!vqState) {
    body.innerHTML = `<div class="card" style="text-align:center;"><div class="serif" style="font-size:20px;font-weight:700;">Nothing here.</div><div class="note">Pick a different filter above.</div></div>`;
    return;
  }
  const q = vqState.question;
  let promptHTML = "";
  if (q.type === "wordToDef") {
    promptHTML = `
      <div class="meta">List ${q.list} · ${q.pos}${q.forms ? " · " + q.forms : ""}</div>

    promptHTML = `

      <div style="font-size:13px;color:var(--ink-3);margin-top:10px;font-style:italic;font-family:'Fraunces',serif;">Hint: ${q.def}</div>
    `;
  }

  body.innerHTML = `

    </div>

    <div class="btn-row">
      <button class="btn secondary small" id="nextQ" style="flex:1; min-height:42px;">Skip →</button>
    </div>
  `;

  });
  document.getElementById("nextQ").addEventListener("click", () => { vqState = buildVocabQuestion(); renderVocabQuiz(body); });
}

function answerVQ(i) {
  if (vqState.settled) return;
  vqState.settled = true;
  const right = i === vqState.answer;
  recordVocab(vqState.target.w, right);

  opts.forEach((el, idx) => {

  document.getElementById("nextQ").classList.remove("secondary");

      ${r.bad ? `<div class="ex wrong">${r.bad}</div>` : ""}
    </div>
  `).join("") + `<div class="spacer-20"></div>
    <button class="btn accent" onclick="document.querySelector('.chip[data-mode=practice]').click();">Try the practice questions →</button>`;
}
function renderAposPractice(body) {
  if (aposQOrder.length === 0) {
    aposQOrder = APOS_Q.map((_, i) => i);
    shuffle(aposQOrder);
    aposQPtr = 0;
  }
  if (aposQPtr >= aposQOrder.length) {
    const a = aposAccuracy();
    body.innerHTML = `
      <div class="card score-screen">
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.2em;color:var(--ink-3);font-weight:600;">Set complete</div>
        <div class="score-pct">${a.correct}<span class="small">/${a.total}</span></div>
        <div class="score-msg">${a.correct === a.total ? "Perfect. Mic drop." : a.correct >= a.total * 0.85 ? "Strong — just clean up a few." : "Review the rules and run it again."}</div>
        <div class="score-sub">Overall lifetime: ${a.correct} of ${a.total} unique questions answered correctly at least once.</div>
        <div class="btn-row">
          <button class="btn green" id="goAgain">Run them again</button>
          <button class="btn secondary" id="backLearn">Review rules</button>
        </div>
      </div>
    `;
    document.getElementById("goAgain").addEventListener("click", () => { aposQOrder = []; aposQPtr = 0; aposQState = null; renderAposPractice(body); });
    document.getElementById("backLearn").addEventListener("click", () => { aposMode = "learn"; renderApos(document.getElementById("view")); });
    return;
  }
  const qIdx = aposQOrder[aposQPtr];
  aposQState = { qIdx, settled: false };
  const q = APOS_Q[qIdx];
  body.innerHTML = `
    <div class="q-progress">
      ${aposQOrder.map((_, i) => `<div class="dot ${i < aposQPtr ? 'done' : i === aposQPtr ? 'current' : ''}"></div>`).join("")}
    </div>
    <div class="q-prompt">
      <div class="meta">Apostrophes · Q${aposQPtr + 1}/${aposQOrder.length}</div>
      <div class="sentence">${q.q}</div>
    </div>
    <div class="q-options" id="aposOpts">
      ${q.options.map((opt, i) => `<button class="q-opt" data-i="${i}"><span style="font-family:'Fraunces',serif;">${opt}</span></button>`).join("")}
    </div>
    <div id="aposFeedback"></div>
    <div class="spacer-12"></div>
    <div class="btn-row">
      <button class="btn secondary small" id="aposNext" style="flex:1; min-height:42px;">Skip →</button>
    </div>
  `;
  document.getElementById("aposOpts").querySelectorAll(".q-opt").forEach(b =>
    b.addEventListener("click", () => answerAposQ(parseInt(b.dataset.i, 10))));
  document.getElementById("aposNext").addEventListener("click", () => { aposQPtr++; renderAposPractice(body); });
}
function answerAposQ(i) {
  if (aposQState.settled) return;
  aposQState.settled = true;
  const q = APOS_Q[aposQState.qIdx];
  const right = i === q.answer;
  recordApos(aposQState.qIdx, right);
  const opts = document.querySelectorAll("#aposOpts .q-opt");
  opts.forEach((el, idx) => {
    el.classList.add("disabled");
    if (idx === q.answer) el.classList.add("right");
    if (idx === i && !right) el.classList.add("wrong");
  });
  const fb = document.getElementById("aposFeedback");
  fb.innerHTML = `<div class="feedback ${right ? 'right' : 'wrong'}"><strong>${right ? 'Right.' : 'Not quite.'}</strong> ${q.rule}</div>`;
  const nxt = document.getElementById("aposNext");
  nxt.textContent = "Next →";
  nxt.classList.remove("secondary");
  nxt.classList.add(right ? "green" : "accent");
}

/* ---------- MOCK TEST ---------- */
let mockState = null; // { questions: [], idx, answers: [], settled }

function buildMockTest() {
  // 30 questions: 15 vocab + 5 commas + 5 q/i + 5 apostrophes
  const vocabPool = shuffle(VOCAB.slice()).slice(0, 15);
  const vocabQs = vocabPool.map(v => {
    const mode = Math.random() < 0.5 ? "wordToDef" : "defToWord";
    const wrongs = pickDistractors(v, mode === "wordToDef" ? "def" : "word", 3);
    const correctVal = mode === "wordToDef" ? v.def : v.w;
    const opts = shuffle(wrongs.concat([correctVal]));
    return {
      section: "vocab",
      target: v.w,
      type: mode,
      prompt: mode === "wordToDef" ? `What does <strong>${v.w}</strong> mean?` : `Which word means: <em>${v.def}</em>`,
      options: opts,
      answer: opts.indexOf(correctVal),
      explain: `${v.w}: ${v.def} <em>"${v.ex}"</em>`
    };
  });
  const commaPool = shuffle(COMMA_Q.slice()).slice(0, 5);
  const commaQs = commaPool.map(q => ({
    section: "comma",
    prompt: q.q,
    options: q.options.slice(),
    answer: q.answer,
    explain: q.rule
  }));
  const qiPool = shuffle(QI_Q.slice()).slice(0, 5);
  const qiQs = qiPool.map(q => ({
    section: "qi",
    prompt: q.q,
    options: q.options.slice(),
    answer: q.answer,
    explain: q.rule
  }));
  const aposPool = shuffle(APOS_Q.slice()).slice(0, 5);
  const aposQs = aposPool.map(q => ({
    section: "apos",
    prompt: q.q,
    options: q.options.slice(),
    answer: q.answer,
    explain: q.rule
  }));
  const all = shuffle(vocabQs.concat(commaQs).concat(qiQs).concat(aposQs));
  return all;
}

function renderMock(view) {
  if (!mockState) {
    view.innerHTML = `
      <div class="card">
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.2em;color:var(--ink-3);font-weight:600;margin-bottom:6px;">The Big One</div>
        <div class="serif" style="font-size:26px;font-weight:700;letter-spacing:-0.02em;line-height:1.15;margin-bottom:8px;">Mock Final Exam</div>
        <div style="color:var(--ink-2);line-height:1.5;margin-bottom:14px;">30 mixed questions: 15 vocab, 5 comma rules, 5 quotes &amp; italics, 5 apostrophes. You'll get a final score and a review of what you missed.</div>
        <div style="font-size:13px;color:var(--ink-3);margin-bottom:14px;font-family:'Fraunces',serif;font-style:italic;">Best score so far: <strong style="color:var(--ink);font-style:normal;">${state.bestMock}%</strong>${state.mockHistory.length ? ` · ${state.mockHistory.length} attempt${state.mockHistory.length === 1 ? '' : 's'}` : ''}</div>
        <button class="btn accent" id="startMock">Start mock test</button>
      </div>
      ${state.mockHistory.length ? `
        <div class="section-title">Past Attempts <span class="sub">${state.mockHistory.length}</span></div>
        ${state.mockHistory.slice().reverse().slice(0, 5).map(h => `
          <div class="menu-btn" style="cursor:default;">
            <div style="flex:1;min-width:0;">
              <div class="mb-title">${h.score}% <span style="font-family:'Inter Tight',sans-serif;font-weight:500;font-size:13px;color:var(--ink-3);">(${Math.round(h.score * h.total / 100)}/${h.total})</span></div>
              <div class="mb-meta">${h.date} · Vocab ${h.sections.vocab} · Commas ${h.sections.comma} · Q&I ${h.sections.qi}</div>
            </div>
          </div>
        `).join("")}
      ` : ""}
    `;
    document.getElementById("startMock").addEventListener("click", () => {
      mockState = { questions: buildMockTest(), idx: 0, answers: [], settled: false };
      renderMock(view);
    });
    return;
  }
  // In-progress test
  if (mockState.idx >= mockState.questions.length) {
    // Score it
    let correct = 0;
    const sectionCorrect = { vocab: 0, comma: 0, qi: 0 };
    const sectionTotal = { vocab: 0, comma: 0, qi: 0 };
    const misses = [];
    mockState.questions.forEach((q, i) => {
      sectionTotal[q.section]++;
      const right = mockState.answers[i] === q.answer;
      if (right) { correct++; sectionCorrect[q.section]++; }
      else misses.push({ q, picked: mockState.answers[i] });
    });
    const total = mockState.questions.length;
    const score = Math.round(100 * correct / total);
    const today = new Date().toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    const attempt = {
      date: today,
      score,
      total,
      sections: {
        vocab: `${sectionCorrect.vocab}/${sectionTotal.vocab}`,
        comma: `${sectionCorrect.comma}/${sectionTotal.comma}`,
        qi: `${sectionCorrect.qi}/${sectionTotal.qi}`
      }
    };
    state.mockHistory.push(attempt);
    if (score > state.bestMock) state.bestMock = score;
    saveState();

    const passing = score >= 85;
    view.innerHTML = `
      <div class="card score-screen">
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.2em;color:${passing ? 'var(--green)' : 'var(--ink-3)'};font-weight:600;">${passing ? 'Test ready ✓' : 'Result'}</div>
        <div class="score-pct">${score}<span class="small">%</span></div>
        <div class="score-msg">${score === 100 ? "Perfect score." : passing ? "You're test ready." : score >= 70 ? "Solid base — patch the gaps below." : "Review and try again."}</div>
        <div class="score-sub">${correct}/${total} · Vocab ${attempt.sections.vocab} · Commas ${attempt.sections.comma} · Q&amp;I ${attempt.sections.qi}</div>
        <div class="btn-row">
          <button class="btn green" id="newMock">Take another</button>
          <button class="btn secondary" id="backHome">Home</button>
        </div>
      </div>
      ${misses.length ? `
        <div class="section-title">Missed (${misses.length}) <span class="sub">Review</span></div>
        <div class="review-list">
          ${misses.map(m => `
            <div class="review-row">
              <div class="rw-q">${m.q.prompt.replace(/<[^>]+>/g, "")}</div>
              <div class="rw-a"><em>${m.q.explain}</em></div>
            </div>
          `).join("")}
        </div>
      ` : `<div class="note">Zero misses. Genuinely impressive.</div>`}
    `;
    document.getElementById("newMock").addEventListener("click", () => { mockState = null; renderMock(view); });
    document.getElementById("backHome").addEventListener("click", () => { mockState = null; switchTab("home"); });
    return;
  }

  // Render current question
  const q = mockState.questions[mockState.idx];
  view.innerHTML = `
    <div class="q-progress">
      ${mockState.questions.map((_, i) => {
        const cls = i < mockState.idx ? (mockState.answers[i] === mockState.questions[i].answer ? "done" : "miss") : (i === mockState.idx ? "current" : "");
        return `<div class="dot ${cls}"></div>`;
      }).join("")}
    </div>
    <div class="q-prompt">
      <div class="meta">Question ${mockState.idx + 1} / ${mockState.questions.length} · ${q.section === 'vocab' ? 'Vocab' : q.section === 'comma' ? 'Comma' : q.section === 'qi' ? 'Quotes & Italics' : 'Apostrophes'}</div>
      <div class="sentence">${q.prompt}</div>
    </div>
    <div class="q-options" id="mockOpts">
      ${q.options.map((opt, i) => `<button class="q-opt" data-i="${i}"><span style="font-family:${q.section === 'vocab' ? 'inherit' : "'Fraunces',serif"};">${opt}</span></button>`).join("")}
    </div>
    <div id="mockFeedback"></div>
    <div class="spacer-12"></div>
    <button class="btn secondary" id="mockNext" style="display:none;">Next →</button>
  `;
  document.getElementById("mockOpts").querySelectorAll(".q-opt").forEach(b =>
    b.addEventListener("click", () => answerMock(parseInt(b.dataset.i, 10))));
  document.getElementById("mockNext").addEventListener("click", () => { mockState.idx++; mockState.settled = false; renderMock(view); });
}
function answerMock(i) {
  if (mockState.settled) return;
  mockState.settled = true;
  mockState.answers[mockState.idx] = i;
  const q = mockState.questions[mockState.idx];
  const right = i === q.answer;
  if (q.section === "vocab") recordVocab(q.target, right);
  if (q.section === "comma") {/* don't pollute targeted question records */}
  if (q.section === "qi") {/* same */}
  const opts = document.querySelectorAll("#mockOpts .q-opt");
  opts.forEach((el, idx) => {
    el.classList.add("disabled");
    if (idx === q.answer) el.classList.add("right");
    if (idx === i && !right) el.classList.add("wrong");
  });
  const fb = document.getElementById("mockFeedback");
  fb.innerHTML = `<div class="feedback ${right ? 'right' : 'wrong'}"><strong>${right ? 'Right.' : 'Nope.'}</strong> ${q.explain}</div>`;
  const nxt = document.getElementById("mockNext");
  nxt.style.display = "flex";
  nxt.classList.remove("secondary");
  nxt.classList.add(right ? "green" : "accent");
  nxt.textContent = mockState.idx + 1 >= mockState.questions.length ? "See results →" : "Next →";
}

/* ---------- CHEAT SHEET ---------- */
function renderCheat(view) {
  const byList = [1, 2, 3, 4].map(l => ({
    n: l,
    words: VOCAB.filter(v => v.list === l)
  }));
  view.innerHTML = `
    <div class="note">Everything in one place. Scan before the test or scroll the night before.</div>

    <div class="section-title">Vocab <span class="sub">${VOCAB.length} words</span></div>
    ${byList.map(b => `
      <div style="font-family:'Fraunces',serif;font-weight:700;font-size:15px;letter-spacing:-0.01em;margin:14px 0 6px 0;color:var(--ink-2);">List ${b.n}${b.n === 3 ? ' · Letter from a Birmingham Jail' : ''}</div>
      <div class="list-table">
        ${b.words.map(v => `
          <div class="list-row">
            <div class="w">${v.w}${v.forms ? `<br><em style="font-family:'Fraunces',serif;font-weight:400;font-size:12px;color:var(--ink-3);font-style:italic;">${v.forms}</em>` : ''}</div>
            <div class="d">${v.def} <em>"${v.ex}"</em></div>
          </div>
        `).join("")}
      </div>
    `).join("")}

    <div class="section-title">Comma Rules <span class="sub">9 rules</span></div>
    ${COMMA_RULES.map((r, i) => `
      <div class="rule" style="border-left-color:var(--accent);">
        <div class="rule-num">Rule ${i + 1}</div>
        <div class="rule-title">${r.title}</div>
        <div class="rule-body">${r.body}</div>
        <div class="ex">${r.good}</div>
      </div>
    `).join("")}

    <div class="section-title">Quotes &amp; Italics <span class="sub">9 rules</span></div>
    ${QI_RULES.map((r, i) => `
      <div class="rule" style="border-left-color:var(--gold);">
        <div class="rule-num">Rule ${i + 1}</div>
        <div class="rule-title">${r.title}</div>
        <div class="rule-body">${r.body}</div>
        <div class="ex">${r.good}</div>
      </div>
    `).join("")}

    <div class="section-title">Apostrophes <span class="sub">9 rules</span></div>
    ${APOS_RULES.map((r, i) => `
      <div class="rule" style="border-left-color:var(--green);">
        <div class="rule-num">Rule ${i + 1}</div>
        <div class="rule-title">${r.title}</div>
        <div class="rule-body">${r.body}</div>
        <div class="ex">${r.good}</div>
      </div>
    `).join("")}

    <div class="card dark" style="margin-top:18px;">
      <div style="font-family:'Fraunces',serif;font-weight:700;font-size:18px;letter-spacing:-0.01em;margin-bottom:6px;">The 30-Second Cheat</div>
      <div style="line-height:1.6;font-size:14.5px;">
        <strong style="color:var(--gold);">Commas:</strong> series · before FANBOYS in compound sentences · after intro phrases · around nonessential info · direct address · dialogue tags · coordinate adjectives · dates &amp; places · transitions.<br><br>
        <strong style="color:var(--gold);">Italics:</strong> books, movies, plays, albums, magazines, newspapers, TV series, ships, foreign words, words as words, emphasis (rare).<br><br>
        <strong style="color:var(--gold);">Quotes:</strong> short stories, poems, songs, articles, chapters, episodes, direct quotations. Commas and periods always INSIDE the closing quote in American English.<br><br>
        <strong style="color:var(--gold);">Apostrophes:</strong> contractions (don't, it's, you're) · singular possessive +'s (James's car) · plural possessive ending in s just +' (the dogs' bones) · irregular plurals +'s (children's, men's) · IT'S = it is, ITS = belongs to it · NO apostrophe for plain plurals (the Penns, not the Penn's).
      </div>
    </div>
  `;
}

/* ============ INIT ============ */
document.getElementById("resetLink").addEventListener("click", () => {
  if (confirm("Reset ALL progress? (vocab mastery, mock test history, everything)")) {
    state = JSON.parse(JSON.stringify(defaultState));
    saveState();
    switchTab("home");
  }
});

renderTabs();
render();
</script>
